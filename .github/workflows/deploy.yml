name: Deploy to EC2

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  deploy:
    name: Deploy ${{ github.ref_name }} to EC2
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy via SSM
        run: |
          TAG="${{ github.ref_name }}"
          INSTANCE="${{ secrets.EC2_INSTANCE_ID }}"
          DEPLOY_PATH="${{ secrets.EC2_DEPLOY_PATH }}"

          # Build deploy script as a JSON-safe string
          SCRIPT=$(cat <<SCRIPT
          set -e
          cd ${DEPLOY_PATH}
          git fetch origin --tags
          git checkout ${TAG}
          source .venv/bin/activate
          pip install -e . --quiet
          python scripts/validate_pack.py
          echo "Deploy of ${TAG} complete"
          SCRIPT
          )

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE" \
            --document-name "AWS-RunShellScript" \
            --parameters "{\"commands\":[\"$SCRIPT\"]}" \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND_ID"

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE"

          OUTPUT=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE" \
            --output json)

          echo "$OUTPUT" | python3 -c "
          import json, sys
          r = json.load(sys.stdin)
          print('STDOUT:', r.get('StandardOutputContent',''))
          print('STDERR:', r.get('StandardErrorContent',''))
          status = r.get('StatusDetails','')
          print('Status:', status)
          sys.exit(0 if status == 'Success' else 1)
          "

      - name: Notify on success
        if: success()
        run: echo "TODO - Teams Graph API notification"

      - name: Notify on failure
        if: failure()
        run: echo "TODO - Teams Graph API alert"
