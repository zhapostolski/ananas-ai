name: Deploy to EC2

# Triggers on version tags: git tag v0.2.1 && git push origin v0.2.1
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  deploy:
    name: Deploy ${{ github.ref_name }} to EC2
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "set -e",
              "cd ${{ secrets.EC2_DEPLOY_PATH }}",
              "git fetch origin --tags",
              "git checkout ${{ github.ref_name }}",
              "source .venv/bin/activate",
              "pip install -e . --quiet",
              "python scripts/validate_pack.py",
              "echo Deploy of ${{ github.ref_name }} complete"
            ]' \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          # Wait for the command to finish (up to 5 minutes)
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}"

          # Print output
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "[StandardOutputContent, StandardErrorContent]" \
            --output text

      - name: Notify Teams on success
        if: success()
        run: echo "TODO: post deploy success to #marketing-ops via Graph API"

      - name: Notify Teams on failure
        if: failure()
        run: echo "TODO: post deploy failure alert to #marketing-ops via Graph API"
