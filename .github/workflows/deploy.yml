name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  # ── QA gate — must pass before deploy ─────────────────────────────────────
  quality:
    name: Lint + Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Ruff format check
        run: ruff format --check src/ tests/ scripts/

      - name: Ruff lint
        run: ruff check src/ tests/ scripts/

      - name: Mypy
        run: mypy src/ananas_ai/

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        env:
          ANANAS_DB_PATH: ":memory:"
          ANTHROPIC_API_KEY: "sk-ant-test-key"
          OPENAI_API_KEY: "sk-test-key"
        run: pytest

  validate:
    name: Config validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Validate repository pack
        run: python scripts/validate_pack.py

  secrets-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for leaked secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.before }}
          head: ${{ github.event.after }}
          extra_args: --only-verified
        continue-on-error: ${{ github.event.before == '0000000000000000000000000000000000000000' }}

  # ── Deploy — only runs if all QA jobs pass ─────────────────────────────────
  deploy:
    name: Deploy ${{ github.ref_name }} to EC2
    runs-on: ubuntu-latest
    needs: [quality, test, validate, secrets-scan]

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy via SSM
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          DEPLOY_PATH: ${{ secrets.EC2_DEPLOY_PATH }}
          TAG: ${{ github.ref_name }}
        run: |
          python3 - <<'PYEOF'
          import boto3, os, sys, time

          instance_id = os.environ["INSTANCE_ID"]
          deploy_path = os.environ["DEPLOY_PATH"]
          tag = os.environ["TAG"]

          commands = [
              f"cd {deploy_path}",
              "git fetch origin --tags",
              f"git checkout {tag}",
              "source .venv/bin/activate",
              "pip install -e . --quiet",
              "python scripts/validate_pack.py",
              f"echo 'Deploy of {tag} complete'",
          ]

          ssm = boto3.client("ssm", region_name=os.environ.get("AWS_DEFAULT_REGION", "eu-central-1"))

          resp = ssm.send_command(
              InstanceIds=[instance_id],
              DocumentName="AWS-RunShellScript",
              Parameters={"commands": commands},
          )
          cmd_id = resp["Command"]["CommandId"]
          print(f"SSM command ID: {cmd_id}")

          for _ in range(60):
              time.sleep(5)
              inv = ssm.get_command_invocation(CommandId=cmd_id, InstanceId=instance_id)
              status = inv["StatusDetails"]
              print(f"Status: {status}")
              if status in ("Success", "Failed", "Cancelled", "TimedOut"):
                  break

          print("STDOUT:", inv.get("StandardOutputContent", ""))
          print("STDERR:", inv.get("StandardErrorContent", ""))

          if status != "Success":
              print(f"Deploy failed with status: {status}")
              sys.exit(1)
          PYEOF

      - name: Notify on failure
        if: failure()
        run: echo "TODO - Teams alert on deploy failure"
