name: Feature request
description: New agent, integration, metric, or capability
labels: ["enhancement"]

body:
  - type: dropdown
    id: phase
    attributes:
      label: Phase
      options:
        - Phase 1 (active)
        - Phase 2 (planned)
        - Phase 3 (vision)
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: Type
      options:
        - New agent
        - New integration / connector
        - New metric
        - Infrastructure change
        - Portal / UI
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      placeholder: What gap or pain point does this address?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] ...
        - [ ] ...
