name: Bug report
description: Something is broken or behaving unexpectedly
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        Please fill in as much detail as you can. Check `agent_logs` and `system_health` first.

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - performance-agent
        - crm-lifecycle-agent
        - reputation-agent
        - marketing-ops-agent
        - cross-channel-brief-agent
        - Teams delivery
        - Email delivery
        - Database / persistence
        - Config / validation
        - CI / deployment
        - Other
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      placeholder: Describe the bug clearly
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What should have happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      render: shell

  - type: input
    id: date
    attributes:
      label: When did this happen?
      placeholder: "e.g. 2026-03-15, ~07:00 UTC"
