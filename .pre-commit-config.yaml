default_install_hook_types: [pre-commit, pre-push]

repos:
  # -- Ruff: lint + format -----------------------------------------------------
  # --no-cache avoids stale results; ruff-format runs after ruff --fix
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff
        args: [--fix, --no-cache]
      - id: ruff-format

  # -- Mypy: type check --------------------------------------------------------
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: mypy src/ananas_ai/
        language: system
        types: [python]
        pass_filenames: false

  # -- File hygiene ------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-ast
        name: check python syntax

  # -- Secret scanning: catch secrets before GitHub does (runs on push) --------
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        stages: [pre-push]
