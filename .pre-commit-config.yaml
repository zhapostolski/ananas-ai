repos:
  # ── Ruff: lint + format ──────────────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # ── Mypy: type check ─────────────────────────────────────────────────────────
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: mypy src/ananas_ai/
        language: system
        types: [python]
        pass_filenames: false

  # ── File hygiene ─────────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: mixed-line-ending
        args: [--fix=lf]
